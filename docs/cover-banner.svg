<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="86" y1="40" x2="1194" y2="603" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="0.45" stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#F5F3FF"/>
    </linearGradient>
    <linearGradient id="cardBoss" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="cardFlow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="cardWorker" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C2410C"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="28" fill="url(#bg)"/>
  <circle cx="1120" cy="120" r="110" fill="#DBEAFE" fill-opacity="0.7"/>
  <circle cx="160" cy="548" r="140" fill="#FED7AA" fill-opacity="0.55"/>

  <text x="72" y="108" fill="#0F172A" font-size="44" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">
    OpenClaw Xiaohongshu Boss Kit
  </text>
  <text x="72" y="156" fill="#334155" font-size="22" font-family="Microsoft YaHei, PingFang SC, sans-serif">
